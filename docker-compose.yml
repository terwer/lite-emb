# lite-emb Docker Compose 编排
# 用法:
#   docker compose up -d          # 启动服务
#   docker compose logs -f        # 查看日志
#   docker compose down           # 停止服务
#
# 国内用户：先在 Docker Desktop → Settings → Resources → Proxies 配置代理
#   代理仅用于 docker daemon 拉取基础镜像，容器内仍走国内源直连

services:
  lite-emb:
    build:
      context: .
      args:
        # 设置为 true 可在构建时预下载模型
        PRELOAD_MODEL: "false"
        # ---- 国内镜像加速（默认关闭） ----
        # 构建时传参启用：--build-arg USE_APT_MIRROR=true --build-arg USE_PYPI_MIRROR=true
        USE_APT_MIRROR: "false"
        APT_MIRROR: "mirrors.aliyun.com"
        USE_PYPI_MIRROR: "false"
        PYPI_MIRROR: "https://pypi.tuna.tsinghua.edu.cn/simple"
    image: lite-emb:0.1.0
    container_name: lite-emb
    ports:
      - "8000:8000"
    environment:
      # 服务器配置
      - DEV_HOST=0.0.0.0
      - DEV_PORT=8000
      # 模型配置
      - MODEL_NAME=e5-small
      - RERANK_MODEL_NAME=bge-reranker-base
      - MAX_BATCH_SIZE=32
      - MAX_SEQUENCE_LENGTH=512
      # 预加载
      - PRELOAD_MODEL=true
      - ALLOW_MODEL_SWITCH=false
      # Embedding 配置
      - EMBEDDING_NORMALIZE=true
      # HuggingFace 配置
      - HF_ENDPOINT=https://hf-mirror.com
      - HF_HUB_ENABLE_HF_TRANSFER=true
      - HF_HUB_OFFLINE=0
      # 日志
      - LOG_LEVEL=INFO
      - LOG_FILE=logs/app.log
    volumes:
      # 持久化 HuggingFace 模型缓存（避免重复下载）
      - hf_cache:/home/appuser/.cache/huggingface
      # 持久化 lite-emb 自定义模型缓存（CDN 下载的模型）
      - lite_emb_cache:/home/appuser/.cache/lite-emb
      # 持久化日志
      - ./logs:/app/logs
    restart: unless-stopped
    # GPU 支持（需要 nvidia-container-toolkit）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  hf_cache:
    driver: local
  lite_emb_cache:
    driver: local
